<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <div class="msg-container hide">

      <p id="msg">Winner</p>
      <button id="new-btn">New Game</button>
      
    </div>

    <main>

      <h1>Tic Tac Toe</h1>

      <div class="container">

        <div class="game">

          <button class="box" title="Position 1"></button>
          <button class="box" title="Position 2"></button>
          <button class="box" title="Position 3"></button>
          <button class="box" title="Position 4"></button>
          <button class="box" title="Position 5"></button>
          <button class="box" title="Position 6"></button>
          <button class="box" title="Position 7"></button>
          <button class="box" title="Position 8"></button>
          <button class="box" title="Position 9"></button>

        </div>

      </div>

      <button id="reset-btn">Reset Game</button>

    </main>

    <script src="dist/app.js"></script>

  </body>
</html>
